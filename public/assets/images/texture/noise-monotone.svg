<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" preserveAspectRatio="none">
  <filter id="noiseFilter" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.52" numOctaves="2" seed="11" stitchTiles="stitch" result="noise" />
    <feColorMatrix in="noise" type="luminanceToAlpha" result="alphaNoise" />
    <feComponentTransfer in="alphaNoise" result="boostedNoise">
      <feFuncA type="table" tableValues="0 0.08 0.2 0.34 0.5" />
    </feComponentTransfer>
    <feFlood flood-color="#000000" flood-opacity="1" result="flood" />
    <feComposite in="flood" in2="boostedNoise" operator="in" />
  </filter>
  <rect width="100%" height="100%" filter="url(#noiseFilter)" />
</svg>
